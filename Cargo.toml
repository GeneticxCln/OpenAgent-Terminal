[workspace]
members = [
    "openagent-terminal",
    "openagent-terminal-core",
    "openagent-terminal-config",
    "openagent-terminal-config-derive",
    "openagent-terminal-sync",
    "openagent-terminal-ai",
    "crates/plugin-api",
    "crates/plugin-loader",
    "crates/workflow-engine",
    "plugins/git-context",
    "plugins/docker-helper",
    "plugins/dev-tools",
]
resolver = "2"

[workspace.package]
edition = "2021"
rust-version = "1.79.0"
repository = "https://github.com/GeneticxCln/OpenAgent-Terminal"

[profile.release]
lto = "thin"
debug = 1
incremental = false

[workspace.dependencies]
# Core dependencies (always needed)
toml = "0.9.2"
toml_edit = "0.23.1"
anyhow = "1.0"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Async runtime
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Rendering - WGPU
wgpu = "0.19"
raw-window-handle = "0.6"
winit = { version = "0.30.9", default-features = false, features = ["rwh_06"] }

# Text shaping and fonts (core requirement)
swash = "0.1"
harfbuzz-rs = "2.0"
fontdb = "0.16"
ttf-parser = "0.20"
unicode-bidi = "0.3"
ab-glyph = "0.2"

# Database
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite"] }
rusqlite = { version = "0.30", features = ["bundled"] }

# AI capabilities
reqwest = { version = "0.11", features = ["json", "stream"] }
async-openai = "0.19"

# Plugin system
wasmtime = "17.0"
wasmtime-wasi = "17.0"
jsonrpc-core = "18.0"
jsonrpc-ipc-server = "18.0"

# Workflow system
tera = "1.19"
regex = "1.10"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4"] }

# UI components
egui = "0.25"
egui-winit = "0.25"
egui-wgpu = "0.25"
ratatui = "0.25"

# Performance monitoring
pprof = { version = "0.13", features = ["flamegraph"] }
metrics = "0.21"
metrics-exporter-prometheus = "0.13"
