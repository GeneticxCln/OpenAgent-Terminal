[workspace]
members = [
    "openagent-terminal",
    "openagent-terminal-core",
    "openagent-terminal-config",
    "openagent-terminal-config-derive",
    "openagent-terminal-sync",
    "openagent-terminal-ai",
    "crates/plugin-api",
    "crates/plugin-loader",
    "crates/plugin-sdk",
    "crates/plugin-system",
    "crates/workflow-engine",
    "plugins/git-context",
    "plugins/docker-helper",
    "plugins/dev-tools",
    "crates/openagent-terminal-migrate",
    "crates/openagent-terminal-themes",
    "crates/openagent-terminal-snippets",
    # IDE components
    "crates/openagent-terminal-ide-indexer",
    "crates/openagent-terminal-ide-lsp",
    "crates/openagent-terminal-ide-dap",
    "crates/openagent-terminal-ide-editor",
    "crates/openagent-terminal-web-editors",
]
resolver = "2"

[workspace.package]
edition = "2021"
rust-version = "1.79.0"
repository = "https://github.com/GeneticxCln/OpenAgent-Terminal"

[profile.release]
lto = "thin"
debug = 1
incremental = false

[workspace.dependencies]
# Core dependencies (always needed)
toml = "0.9.5"
toml_edit = "0.23.2"
anyhow = "1.0"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-log = "0.2"
# Web editor server stack
axum = "0.7"
hyper = { version = "1.4", features = ["http1", "http2", "server"] }
tokio-tungstenite = "0.24"
tungstenite = "0.21"
open = "5.3"
urlencoding = "2.1"
wry = "0.44"

# Async runtime
tokio = { version = "1.47", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Rendering - WGPU
wgpu = "26.0"
raw-window-handle = "0.6"
winit = { version = "0.30.11", default-features = false, features = ["rwh_06"] }

# Text shaping and fonts (core requirement)
swash = "0.1"
harfbuzz_rs = "2.0"
fontdb = "0.23"
ttf-parser = "0.20"
unicode-bidi = "0.3"
ab-glyph = "0.2"

# Database
sqlx = { version = "0.8.1", default-features = false, features = ["runtime-tokio-rustls", "sqlite", "derive"] }
rusqlite = { version = "0.32", features = ["bundled"] }

# AI capabilities
reqwest = { version = "0.12", features = ["json", "stream", "blocking"] }
async-openai = "0.25"

# Plugin system
wasmtime = "36.0"
wasmtime-wasi = "36.0"
jsonrpc-core = "18.0"
jsonrpc-ipc-server = "18.0"

# Workflow system
tera = "1.19"
regex = "1.10"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4", "serde"] }

# UI components
egui = "0.29"
egui-winit = "0.29"
egui-wgpu = "0.29"
ratatui = "0.30"

# Performance monitoring
pprof = { version = "0.13", features = ["flamegraph"] }
metrics = "0.21"
metrics-exporter-prometheus = "0.13"
crossfont = "0.8.0"

# Synchronization
parking_lot = "0.12"
