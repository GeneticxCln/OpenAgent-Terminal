# OpenAgent Terminal example configuration (TOML)
# Save as: ~/.config/openagent-terminal/openagent-terminal.toml

# --- Global UI ---
# Override theme-provided reduce_motion; when true, minimize/disable animations.
# When omitted, theme.reduce_motion (if any) applies.
# reduce_motion_override = true

# --- Workspace: Tab Bar ---
[workspace.tab_bar]
# Show the tab bar (Warp overlay-style, no reserved row)
show = true
position = "Top" # "Top" | "Bottom" | "Hidden"

# --- Workspace: Pane Drag Gesture ---
[workspace.drag]
# Enable pane drag-and-drop between splits and tabs.
enable_pane_drag = true
# Modifier required to start a drag: "Alt" | "Ctrl" | "Shift" | "Meta" | "None"
pane_drag_modifier = "Alt"
# Mouse button to start the drag: "Left" | "Middle" | "Right"
pane_drag_button = "Left"
# Optional explicit highlight color for drag drop zones (overrides theme tokens)
# highlight_color = "#7aa2f7"
# Minimum alpha in light themes for better visibility (optional)
# highlight_min_alpha = 0.08
# Drop highlight alpha tuning
highlight_alpha_base = 0.15
highlight_alpha_hover = 0.5
# Tab bar hover highlight alpha when dropping onto a tab
tab_highlight_alpha_base = 0.12
tab_highlight_alpha_hover = 0.40
# New Tab area highlight alpha
new_tab_highlight_alpha_base = 0.10
new_tab_highlight_alpha_hover = 0.45
# Snap behavior near the tab bar to ease targeting
tab_drop_snap_px = 6.0
new_tab_snap_extra_px = 24.0

# Example alternative: Ctrl + Middle-click to drag panes
# pane_drag_modifier = "Ctrl"
# pane_drag_button = "Middle"

# --- Splits ---
[workspace.splits]
# Visual preview/handles for split dividers
preview_enabled = true
show_resize_handles = true
# Divider thickness and increment
border_thickness = 1.0
resize_increment = 5

# --- Rendering backend (WGPU-only) ---
[debug]
# WGPU-only. OpenGL fallback has been removed.
# prefer_wgpu is kept for compatibility and should remain true.
prefer_wgpu = true

# --- AI (optional) ---
# [ai]
# enabled = true
# provider = "ollama"  # or "openai", "anthropic"
# trigger_key = "Ctrl+Shift+A"
# never_auto_run = true

