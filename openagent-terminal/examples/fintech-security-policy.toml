# FinTech Organization Security Policy Bundle
# High-security configuration for financial technology environments
# Includes PCI DSS, SOX, and financial regulation compliance patterns

[security_lens]
enabled = true
block_critical = true
docs_base_url = "https://security.fintech-corp.com/compliance"
gate_paste_events = true

[security_lens.require_confirmation]
Safe = false
Caution = true
Warning = true
Critical = true

[security_lens.require_reason]
Safe = false
Caution = false
Warning = true
Critical = true

# Strict rate limiting for financial environments
[security_lens.rate_limit]
max_detections = 3
window_seconds = 300  # 5 minutes
enabled = true

# === FinTech-specific High-Risk Patterns ===

# Database operations - Financial data protection
[[security_lens.custom_patterns]]
pattern = "(?i)(mysql|psql|mongo)\\s+.*-(prod|production|pci)"
risk_level = "Critical"
message = "Direct database access to financial production systems"

# Payment processing systems
[[security_lens.custom_patterns]]
pattern = "(?i)(payment|transaction|settlement).*service.*(stop|restart|kill)"
risk_level = "Critical"
message = "Operation affecting payment processing services"

# PCI DSS compliance - cardholder data environment
[[security_lens.custom_patterns]]
pattern = "(?i)(cardholder|chd|pan|cvv|credit.*card).*data"
risk_level = "Critical"
message = "Potential exposure of cardholder data (PCI DSS violation)"

# Financial audit trail tampering
[[security_lens.custom_patterns]]
pattern = "(?i)(audit|compliance|sox).*log.*(delete|truncate|rm)"
risk_level = "Critical"
message = "Tampering with financial audit trails"

# Encryption key management
[[security_lens.custom_patterns]]
pattern = "(?i)(hsm|vault|keystore).*(delete|remove|disable)"
risk_level = "Critical"
message = "Operation affecting cryptographic key management"

# Trading system operations
[[security_lens.custom_patterns]]
pattern = "(?i)(trading|market|order).*(engine|system).*(stop|kill|restart)"
risk_level = "Critical"
message = "Operation affecting trading system components"

# Financial data export/backup
[[security_lens.custom_patterns]]
pattern = "(?i)(mysqldump|pg_dump).*\\s+(transaction|account|payment|financial)"
risk_level = "Warning"
message = "Exporting financial transaction data"

# Risk management system manipulation
[[security_lens.custom_patterns]]
pattern = "(?i)(risk|fraud|aml).*(engine|system).*(disable|bypass|stop)"
risk_level = "Critical"
message = "Operation affecting risk or fraud prevention systems"

# Compliance reporting tools
[[security_lens.custom_patterns]]
pattern = "(?i)(compliance|regulatory).*report.*(delete|modify|truncate)"
risk_level = "Warning"
message = "Modifying compliance or regulatory reports"

# Financial network security
[[security_lens.custom_patterns]]
pattern = "(?i)(swift|fed|ach|wire).*network.*(disconnect|disable)"
risk_level = "Critical"
message = "Operation affecting financial network connections"

# === Cloud Provider Patterns for Financial Services ===

# AWS Financial Services patterns
[[security_lens.custom_patterns]]
pattern = "(?i)aws\\s+.*\\s+--profile\\s+.*(prod|production|pci|sox)"
risk_level = "Warning"
message = "AWS operation in regulated environment"

[[security_lens.custom_patterns]]
pattern = "(?i)aws\\s+kms\\s+(delete|disable|schedule-deletion)"
risk_level = "Critical"
message = "AWS KMS key deletion (regulatory compliance risk)"

# GCP Financial patterns
[[security_lens.custom_patterns]]
pattern = "(?i)gcloud\\s+.*\\s+--project=.*(prod|financial|pci)"
risk_level = "Warning"
message = "GCP operation in financial production environment"

# Azure Financial patterns
[[security_lens.custom_patterns]]
pattern = "(?i)az\\s+keyvault\\s+(delete|purge)"
risk_level = "Critical"
message = "Azure Key Vault deletion (compliance risk)"

# === Container Security for Financial Services ===

[[security_lens.custom_patterns]]
pattern = "(?i)docker\\s+run.*--volume.*/(pci|financial|cardholder)"
risk_level = "Warning"
message = "Mounting financial data directories in containers"

[[security_lens.custom_patterns]]
pattern = "(?i)kubectl\\s+.*secret.*(payment|financial|pci)"
risk_level = "Warning"
message = "Kubernetes operation on financial secrets"

# === Monitoring and Alerting ===

[[security_lens.custom_patterns]]
pattern = "(?i)(splunk|elk|prometheus|grafana).*(delete|remove|stop).*financial"
risk_level = "Warning"
message = "Operation affecting financial monitoring systems"

# === Backup and Recovery ===

[[security_lens.custom_patterns]]
pattern = "(?i)backup.*(delete|remove).*(financial|transaction|account)"
risk_level = "Critical"
message = "Deletion of financial data backups"

# === Network Security ===

[[security_lens.custom_patterns]]
pattern = "(?i)(firewall|vpn|proxy).*(disable|stop).*financial"
risk_level = "Critical"
message = "Disabling security controls in financial environment"

# === Development vs Production Safeguards ===

[[security_lens.custom_patterns]]
pattern = "(?i)rsync.*prod.*dev|cp.*production.*development"
risk_level = "Critical"
message = "Copying production financial data to development (PCI/SOX violation)"
