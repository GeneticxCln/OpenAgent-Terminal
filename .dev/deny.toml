# cargo-deny configuration for the OpenAgent Terminal workspace
# See: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
yanked = "deny"
# Temporary ignores with justification and expiry. These are tracked for Phase 3 dependency upgrades.
ignore = [
    # RUSTSEC-2023-0071: rsa timing sidechannel (Marvin)
    # Justification: sqlx-mysql uses RSA public key encryption during MySQL auth; no private key operations are performed
    # by this client, so the timing sidechannel does not apply in our usage. We will re-evaluate in Phase 3 and aim to
    # remove mysql from default builds or move to a fixed version once available.
{ id = "RUSTSEC-2023-0071", reason = "rsa used only for public-key ops via sqlx-mysql auth; no private key timing risk" },

    # Unmaintained crates (to be addressed in Phase 3 upgrades)
{ id = "RUSTSEC-2024-0384", reason = "instant unmaintained via parking_lot 0.11 transitively in jsonrpc stack" },
{ id = "RUSTSEC-2024-0436", reason = "paste unmaintained via wgpu/metal or rav1e; will be resolved by display stack upgrades" },
{ id = "RUSTSEC-2025-0057", reason = "fxhash unmaintained via wasmtime and wry selector stack; plan to upgrade/remove in Phase 3" },

    # GTK3 bindings unmaintained via wry (IDE webview); plan to upgrade to GTK4/wry alt in Phase 3
{ id = "RUSTSEC-2024-0412", reason = "gdk GTK3 unmaintained (wry transitively)" },
{ id = "RUSTSEC-2024-0413", reason = "atk GTK3 unmaintained (wry transitively)" },
{ id = "RUSTSEC-2024-0414", reason = "gdkx11-sys GTK3 unmaintained (wry transitively)" },
{ id = "RUSTSEC-2024-0415", reason = "gtk GTK3 unmaintained (wry transitively)" },
{ id = "RUSTSEC-2024-0416", reason = "atk-sys GTK3 unmaintained (wry transitively)" },
{ id = "RUSTSEC-2024-0417", reason = "gdkx11 GTK3 unmaintained (wry transitively)" },
{ id = "RUSTSEC-2024-0418", reason = "gdk-sys GTK3 unmaintained (wry transitively)" },
{ id = "RUSTSEC-2024-0419", reason = "gtk3-macros GTK3 unmaintained (wry transitively)" },
{ id = "RUSTSEC-2024-0420", reason = "gtk-sys GTK3 unmaintained (wry transitively)" },

    # glib unsound advisory affects GTK3 stack; will be addressed with GTK4/wry upgrades
{ id = "RUSTSEC-2024-0429", reason = "glib VariantStrIter unsound (affects GTK3 stack via wry); planning migration" },

    # proc-macro-error unmaintained via glib-macros/gtk3-macros
{ id = "RUSTSEC-2024-0370", reason = "proc-macro-error unmaintained via GTK3 stack; will be upgraded with GTK4 migration" }
]

[bans]
# Warn on multiple versions of the same crate; escalate to deny later once cleaned up.
multiple-versions = "warn"
# Disallow wildcard dependency versions like version = "*".
wildcards = "deny"
# Highlight all duplicates and conflicts in reports.
highlight = "all"
# Explicitly deny specific crates if needed (e.g., known problematic packages).
deny = [
]
# Allow listed duplicates (crate name and optional version requirement) if unavoidable.
# These are known to coexist across major versions due to upstream semver breaks.
skip = [
    { name = "bitflags" },
    { name = "core-foundation" },
    { name = "core-graphics-types" },
    { name = "foreign-types" },
    { name = "foreign-types-shared" },
    { name = "getrandom" },
    { name = "hashbrown" },
    { name = "hashlink" },
    { name = "linux-raw-sys" },
    { name = "objc2" },
    { name = "objc2-app-kit" },
    { name = "objc2-foundation" },
    { name = "parking_lot" },
    { name = "parking_lot_core" },
    { name = "rand" },
    { name = "rand_chacha" },
    { name = "rand_core" },
    { name = "rustc-hash" },
    { name = "rustix" },
    # Additional duplicate families observed in the workspace
    { name = "serde_spanned" },
    { name = "thiserror" },
    { name = "thiserror-impl" },
    { name = "tokio-util" },
    { name = "toml" },
    { name = "toml_edit" },
    { name = "toml_datetime" },
    { name = "wast" },
    { name = "windows-core" },
    { name = "windows-implement" },
    { name = "windows-interface" },
    { name = "windows-link" },
    { name = "windows-result" },
    { name = "windows-strings" },
    { name = "windows-sys" },
    { name = "windows-targets" },
    { name = "windows_x86_64_gnu" },
]

[licenses]
# Permit common, permissive licenses. Adjust to your policy as needed.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
# How confident we must be about license detection before acting (0.0 - 1.0).
confidence-threshold = 0.8
# Add crate/version-specific license exceptions here if necessary.
exceptions = [
]

[sources]
# Only allow crates from crates.io, forbid unknown registries and git sources by default.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
# If you need to allow git dependencies, list them explicitly here.
allow-git = [
]
