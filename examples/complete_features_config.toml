# OpenAgent Terminal Complete Features Configuration
# This example shows how to configure AI, Command Blocks/History, and Security features

# Window and Display Settings
[window]
dimensions = { columns = 120, lines = 30 }
padding = { x = 10, y = 10 }
decorations = "Full"
opacity = 1.0
title = "OpenAgent Terminal - Complete Features"

[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
size = 12.0

# Terminal Colors
[colors]
# Base colors
primary = { background = "#1e1e1e", foreground = "#ffffff" }

# AI Command Assistance Configuration
[ai]
enabled = true
provider = "ollama"  # Use local Ollama by default for privacy
panel_height_fraction = 0.4
backdrop_alpha = 0.3

# Ollama provider settings (local AI)
[ai.ollama]
endpoint = "http://localhost:11434"
model = "codellama:7b"  # Lightweight model for command assistance
timeout = 30

# Alternative: OpenAI provider (requires API key in environment)
# [ai.openai]
# endpoint = "https://api.openai.com/v1"
# model = "gpt-3.5-turbo"
# timeout = 30

# Alternative: Anthropic provider (requires API key in environment)
# [ai.anthropic]  
# endpoint = "https://api.anthropic.com"
# model = "claude-3-haiku-20240307"
# timeout = 30

# Command Blocks/History Configuration
[blocks]
enabled = true
max_history = 10000
auto_collapse_threshold = 200  # Collapse blocks with more than 200 lines
show_headers = true
show_timing = true

# History storage settings
[blocks.storage]
data_dir = "~/.local/share/openagent-terminal"
compression = true
backup_enabled = true
cleanup_days = 90  # Delete blocks older than 90 days

# Search configuration
[blocks.search]
fuzzy_search = true
index_output = true  # Index command output for searching
max_results = 50

# Export settings
[blocks.export] 
formats = ["json", "csv", "markdown"]
include_output = true
include_metadata = true

# Security Lens Configuration
[security]
enabled = true
block_critical = false  # Warn but don't block by default (user choice)
gate_paste_events = true

# Risk level confirmation requirements
[security.require_confirmation]
Safe = false
Caution = true 
Warning = true
Critical = true

# Custom security patterns for organization-specific risks
[[security.custom_patterns]]
pattern = "(?i)kubectl\\s+delete\\s+.*prod"
risk_level = "Critical"
message = "Deleting production Kubernetes resources"

[[security.custom_patterns]]
pattern = "(?i)aws\\s+s3\\s+(rm|rb)\\s+.*--recursive"
risk_level = "Warning"
message = "Recursive S3 deletion can affect many files"

[[security.custom_patterns]]
pattern = "(?i)docker\\s+system\\s+prune\\s+-a"
risk_level = "Warning" 
message = "Pruning all Docker data including unused images"

[[security.custom_patterns]]
pattern = "(?i)(terraform|pulumi)\\s+destroy"
risk_level = "Critical"
message = "Infrastructure destruction command"

[[security.custom_patterns]]
pattern = "(?i)npm\\s+install\\s+.*--unsafe-perm"
risk_level = "Warning"
message = "Installing npm packages with unsafe permissions"

# Rate limiting to prevent spam
[security.rate_limit]
enabled = true
max_detections = 10
window_seconds = 300  # 5 minutes

# Keybindings for all features
[[keyboard.bindings]]
key = "F1"
action = "ToggleAiPanel"

[[keyboard.bindings]]
key = "F2" 
action = "OpenBlocksSearchPanel"

[[keyboard.bindings]]
key = "F3"
action = "OpenSettingsPanel"

# AI-specific keybindings
[[keyboard.bindings]]
mods = "Control|Shift"
key = "A"
action = "ToggleAiPanel"

# Blocks-specific keybindings  
[[keyboard.bindings]]
mods = "Control|Shift"
key = "S"
action = "OpenBlocksSearchPanel"

[[keyboard.bindings]]
mods = "Alt"
key = "F"
action = "ToggleFoldBlock"

[[keyboard.bindings]]
mods = "Alt"
key = "J"
action = "NextBlock"

[[keyboard.bindings]]
mods = "Alt"
key = "K" 
action = "PreviousBlock"

# Block management
[[keyboard.bindings]]
mods = "Control|Shift"
key = "C"
action = "CopyBlockCommand"

[[keyboard.bindings]]
mods = "Control|Shift"
key = "O"
action = "CopyBlockOutput"

[[keyboard.bindings]]
mods = "Control|Shift"
key = "R"
action = "RerunBlockCommand"

[[keyboard.bindings]]
mods = "Control|Shift"
key = "E"
action = "ExportBlockOutput"

# Workflow and automation
[[keyboard.bindings]]
mods = "Control|Shift"
key = "W"
action = "OpenWorkflowsPanel"

[[keyboard.bindings]]
mods = "Control|Shift"
key = "P"
action = "OpenCommandPalette"

# Integration Examples

# Example 1: AI + Security Integration
# When AI suggests a command, Security Lens automatically analyzes it
# If risky, user gets confirmation dialog before execution
# Example: AI suggests "rm -rf /tmp/*" -> Security flags as Warning -> User confirms

# Example 2: Blocks + AI Integration  
# Command history from blocks can be used as context for AI suggestions
# AI can analyze patterns in command history to suggest improvements
# Example: Frequent "git status" -> AI suggests "git status alias or better workflow"

# Example 3: All Three Together
# 1. User types natural language in AI panel: "clean up docker containers"
# 2. AI suggests: "docker system prune -a"
# 3. Security Lens detects this as Warning level (custom pattern)
# 4. User confirms after reviewing security explanation
# 5. Command executes and gets stored in blocks for future reference and search

# Shell Integration (enables command tracking)
[shell_integration]
enabled = true
osc133 = true  # Terminal sequence support for command boundaries

# Performance Optimization
[performance]
# Reduce memory usage
max_cached_blocks = 1000
ai_response_timeout = 30
security_analysis_cache_size = 500

# Rendering optimizations
vsync = true
max_fps = 60

# Development and Debug Settings  
[debug]
# Enable for troubleshooting
log_level = "info"
ai_debug = false
blocks_debug = false
security_debug = false

# Performance monitoring
performance_overlay = false
render_timer = false

# Example Environment Variables (set these in your shell)
# For OpenAI:
# export OPENAI_API_KEY="your-api-key-here"
# export OPENAI_API_BASE="https://api.openai.com/v1"  # Optional custom endpoint
# export OPENAI_MODEL="gpt-3.5-turbo"  # Optional custom model

# For Anthropic:
# export ANTHROPIC_API_KEY="your-api-key-here"
# export ANTHROPIC_API_BASE="https://api.anthropic.com"  # Optional custom endpoint  
# export ANTHROPIC_MODEL="claude-3-haiku-20240307"  # Optional custom model

# For Ollama (if not using default):
# export OLLAMA_HOST="http://localhost:11434"  # Optional custom host
# export OLLAMA_MODEL="codellama:7b"  # Optional custom model

# Usage Tips:
# 1. Start with local Ollama for privacy and no API costs
# 2. Use conservative security settings in production environments
# 3. Regular cleanup of command history (set cleanup_days appropriately)
# 4. Customize security patterns for your organization's tools and workflows
# 5. Use keyboard shortcuts for efficient workflow
# 6. Export important command sequences as workflows for reuse

# Getting Started:
# 1. Install and start Ollama: https://ollama.ai/
# 2. Pull a code model: ollama pull codellama:7b
# 3. Start OpenAgent Terminal with this config
# 4. Press F1 or Ctrl+Shift+A to open AI panel
# 5. Try: "list all files modified today"
# 6. Press F2 or Ctrl+Shift+S to search command history
# 7. Use Alt+F to fold/unfold command blocks for better visibility
