# OpenAgent Terminal Local-Only Configuration
# Privacy-first setup using only Ollama (local AI)

[ai]
enabled = true
provider = "ollama"
never_auto_run = true
trigger_key = "Ctrl+Shift+A"
auto_focus = true
animated_typing = true
animation_speed = 1.2

# Privacy-focused settings
privacy_mode = true
cloud_providers_disabled = true
send_telemetry = false

# UI preferences for local development
panel_height_fraction = 0.35
backdrop_alpha = 0.2
shadow = true
shadow_size_px = 6
rounded_corners = true
corner_radius_px = 10.0

# Ollama configuration
[ai.providers.ollama]
endpoint_env = "OPENAGENT_OLLAMA_ENDPOINT"
model_env = "OPENAGENT_OLLAMA_MODEL"
default_endpoint = "http://localhost:11434"
default_model = "codellama:7b"
timeout_seconds = 60
priority = 1

# Enhanced context collection for better local AI performance
[ai.context]
enabled = true
max_bytes = 32768
providers = ["env", "git", "file_tree", "cargo_toml", "package_json"]

[ai.context.timeouts]
per_provider_ms = 200
overall_ms = 500

[ai.context.file_tree]
max_entries = 200
root_strategy = "git"
exclude_patterns = [
    "node_modules", "target", "dist", "build", 
    ".git", ".svn", ".hg",
    "*.log", "*.tmp", "*.cache"
]

[ai.context.git]
include_branch = true
include_status = true
include_recent_commits = 3

# Security settings (even for local AI)
[security]
enabled = true
block_critical = false  # Allow but warn
gate_paste_events = true

[security.require_confirmation]
Safe = false
Caution = true
Warning = true
Critical = true

# Performance optimizations
[blocks]
enabled = true
max_history = 5000
auto_collapse_threshold = 100
show_headers = true
show_timing = true

[blocks.storage]
compression = true
backup_enabled = false  # Keep local for privacy
cleanup_days = 60

# Local logging
[debug]
log_level = "info"
persistent_logging = true
ai_debug = false

# Keybindings
[[keyboard.bindings]]
mods = "Control|Shift"
key = "A"
action = "ToggleAiPanel"

[[keyboard.bindings]]
key = "Escape"
action = "CloseAiPanel"

[[keyboard.bindings]]
mods = "Control"
key = "Enter"
action = "AcceptAiSuggestion"