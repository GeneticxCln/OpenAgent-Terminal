# Minimal plugin manifest for simple-demo plugin

[plugin]
name = "simple-demo"
version = "1.0.0"
author = "OpenAgent Terminal Team"
description = "A very simple plugin demonstrating the simple_plugin macro"
license = "MIT"

[plugin.capabilities]
completions = false
context_provider = false
commands = []
hooks = []
file_associations = []

[permissions]
# No special permissions needed for this simple plugin
environment_variables = []
read_files = []
write_files = []
network = false
execute_commands = false

# Minimal resource limits
max_memory_mb = 10
timeout_ms = 1000

[plugin.metadata]
tags = ["example", "simple", "demo"]
required_host_version = ">=0.3.0"
