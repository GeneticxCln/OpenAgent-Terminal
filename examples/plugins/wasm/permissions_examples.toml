# Example permission manifests for WASM plugins

# read_file_demo: allow reading a safe path (adjust path to your system)
[permissions]
read_files = ["/etc/hostname"]
network = false
execute_commands = false
max_memory_mb = 50
timeout_ms = 3000

# net_fetch_demo: allow GET example.com with caps
[permissions]
network = true
net_allow_domains = ["example.com"]
net_methods_allow = ["GET"]
net_max_response_bytes = 65536
net_timeout_ms = 3000
read_files = []
execute_commands = false

# spawn_demo: allow echo only
[permissions]
execute_commands = true
exec_allow = [{ cmd = "echo", timeout_ms = 2000, max_output_bytes = 65536, cwd_allow = ["/"] }]
network = false
read_files = []
