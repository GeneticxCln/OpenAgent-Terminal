[package]
name = "openagent-terminal-ide"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "IDE features for OpenAgent Terminal (LSP, DAP, editor, indexer)"

[dependencies]
# Core dependencies
anyhow.workspace = true
thiserror.workspace = true
tokio.workspace = true
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true

# Concurrency primitives (feature-gated where used)
parking_lot = { version = "0.12", optional = true }

# Rope buffer for editor
ropey = { version = "1.6", optional = true }

# Gitignore-aware walker and filesystem watching for indexer
ignore = { version = "0.4", optional = true }
notify = { version = "8.0.0", optional = true }

# LSP dependencies
lsp-types = { version = "0.95.1", optional = true }

# Web editor dependencies  
axum = { workspace = true, optional = true }
hyper = { workspace = true, optional = true }
tokio-tungstenite = { workspace = true, optional = true }
wry = { workspace = true, optional = true }

[features]
default = []
lsp = ["lsp-types", "parking_lot"]
editor = ["ropey", "parking_lot"]
indexer = ["ignore", "notify", "parking_lot"]
dap = ["parking_lot"]
web-editors = ["axum", "hyper", "tokio-tungstenite", "wry"]
all = ["lsp", "editor", "indexer", "dap", "web-editors"]
