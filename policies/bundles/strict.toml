# Strict Security Lens policy bundle (enterprise)

[require_confirmation]
Safe = false
Caution = true
Warning = true
Critical = true

[rate_limit]
max_detections = 20
window_seconds = 300
enabled = true

docs_base_url = "https://docs.openagent.dev/security/org"

enabled = true
# Block critical commands outright
block_critical = true
# Gate paste events
[[_gates]]
# NOTE: compatibility shim; paste gating may be nested in policy struct depending on version

