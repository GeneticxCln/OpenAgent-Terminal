# OpenAgent Terminal Configuration Example
# Place this file at ~/.config/openagent-terminal/openagent-terminal.toml

# General settings
[general]
live_config_reload = true
working_directory = "~"

# Window settings
[window]
opacity = 0.95
padding = { x = 10, y = 10 }
decorations = "full"

# Font configuration
[font]
size = 11.0

[font.normal]
family = "JetBrains Mono"
style = "Regular"

# Color scheme
[colors.primary]
background = '#1e1e2e'
foreground = '#cdd6f4'

# Theme configuration (new)
[theme]
# Built-in theme by name: "dark" | "light" | "high-contrast-dark"
name = "dark"
# Or specify a custom theme file (TOML) instead of name
# path = "/path/to/custom_theme.toml"
# Global reduce motion preference (adds to theme value)
reduce_motion = false
# UI visual overrides
rounded_corners = true
corner_radius_px = 12.0
shadow = true
shadow_alpha = 0.35
shadow_size_px = 8

# Optional UI sprite overrides
# Tint icons in the UI sprite atlas with the accent color (set false to use native icon colors)
# palette_icon_tint = true
# Sprite filtering: true = NEAREST (crisp 1x), false = LINEAR (smoother when scaled)
# palette_icon_filter_nearest = false
# Palette icon pixel size (auto: crisp at 16px, smooth when scaled)
# palette_icon_px = 16.0
# Composer caret blink rate in ms (0 disables blink)
# composer_blink_rate_ms = 600
# Word-boundary style: "Alnum" | "Unicode"
# composer_word_boundary_style = "Alnum"
# Composer open mode: "Instant" (Warp-like) opens the AI panel on click/first keystroke,
# or "Commit" to type in the composer and press Enter to open
# composer_open_mode = "Instant"

# Per-user reduce motion override (takes precedence over theme and [theme].reduce_motion)
# Uncomment and set to true/false to force the behavior regardless of theme
# reduce_motion_override = true

# AI Assistant Configuration (optional, disabled by default)
[ai]
enabled = true
# Choose provider: "null", "ollama", "openai", "anthropic", "openrouter"
provider = "ollama"
endpoint_env = "OPENAGENT_AI_ENDPOINT"
api_key_env = "OPENAGENT_AI_API_KEY"
model_env = "OPENAGENT_AI_MODEL"
scratch_autosave = true
propose_max_commands = 10
never_auto_run = true
inline_suggestions = false  # inline suggestions (prototype). Tab/Right to accept, Esc to dismiss
trigger_key = "Ctrl+Shift+A"
# AI logging verbosity: "off" for errors only, "summary" for start/finish, "verbose" for per-chunk
log_verbosity = "summary"
# Visuals
panel_height_fraction = 0.40
backdrop_alpha = 0.25
rounded_corners = true
corner_radius_px = 12.0
shadow = true
shadow_size_px = 8
shadow_alpha = 0.35
# UI behavior
auto_focus = true
animated_typing = true
animation_speed = 1.0

# Runtime context collection for AI (controls how much environment is sent; all sanitized via privacy rules)
[ai.context]
# Master enable for collecting terminal context
enabled = true
# Max bytes of context across providers (approximate); reduce to limit prompt size
max_bytes = 32768  # 32KB
# Ordered list of context providers to include
# Supported providers: "env" (cwd, shell, safe env vars), "git" (branch/status), "file_tree" (relative file list)
providers = ["env", "git", "file_tree"]

[ai.context.timeouts]
# Soft time limits; providers are collected in parallel and truncated on deadline
per_provider_ms = 150
overall_ms = 300
# Optional per-provider overrides
env_ms = 150
git_ms = 200
file_tree_ms = 250

[ai.context.file_tree]
# Limit number of file entries (after .gitignore filtering)
max_entries = 500
# Root strategy for file paths: "git" for repo root or "cwd" for current directory
root_strategy = "git"

[ai.context.git]
# Include current branch name
include_branch = true
# Include summary status (modified/added/deleted/untracked counts)
include_status = true

# Provider-specific settings (optional)
# Ollama (local, privacy-first)
[ai.ollama]
endpoint = "http://localhost:11434"
model = "codellama"
timeout = 30

# OpenAI settings (requires API key)
# Set OPENAI_API_KEY environment variable
# [ai.openai]
# endpoint = "https://api.openai.com/v1"
# model = "gpt-3.5-turbo"
# timeout = 30

# Anthropic settings (requires API key)
# Set ANTHROPIC_API_KEY environment variable
# [ai.anthropic]
# endpoint = "https://api.anthropic.com/v1"
# model = "claude-3-haiku-20240307"
# timeout = 30

# OpenRouter settings (requires API key; OpenAI-compatible)
# Set OPENROUTER_API_KEY environment variable
# [ai.openrouter]
# endpoint = "https://openrouter.ai/api/v1"
# model = "openai/gpt-4o-mini"  # or any OpenRouter-supported model slug
# timeout = 30

# Security Lens Configuration - Command Risk Analysis
[security]
# Enable security analysis for terminal commands
enabled = true
# Block execution of critical risk level commands
block_critical = false
# Gate paste events through security analysis
gate_paste_events = true

# Confirmation requirements by risk level
[security.require_confirmation]
Safe = false
Caution = false
Warning = true
Critical = true

# Require reason/justification for certain risk levels
[security.require_reason]
Critical = true

# Rate limiting for security detections
[security.rate_limit]
enabled = true
max_detections = 10
window_seconds = 300  # 5 minutes

# Documentation base URL for mitigation links
docs_base_url = "https://docs.openagent-terminal.org/security"

# Custom security patterns (advanced)
# [[security.custom_patterns]]
# pattern = "docker\\s+run\\s+.*--privileged"
# risk_level = "Warning"
# message = "Running privileged container"

# Sync Configuration (optional, disabled by default)
[sync]
enabled = false
provider = "null"

# Terminal settings
[terminal]
[terminal.shell]
program = "/bin/bash"

# Scrolling
[scrolling]
history = 10000
multiplier = 3

# Cursor
[cursor]
style = { shape = "Block", blinking = "On" }
vi_mode_style = { shape = "Beam", blinking = "Off" }

# Selection
[selection]
save_to_clipboard = true

# Mouse
[mouse]
hide_when_typing = true

# Debug (optional)
[debug]
render_timer = false
# Render timer style: "LowContrast" | "Warning"
render_timer_style = "LowContrast"
# Use theme tokens for block cursor and/or selection (off by default)
# theme_block_cursor = true
# theme_text_cursors = true
# theme_selection = true
persistent_logging = false
log_level = "Info"
# WGPU-only. OpenGL fallback has been removed.
prefer_wgpu = true
# Preview: enable plugin system (WASI sandbox) if built with `--features plugins`
plugins_preview = false

# Plugins configuration
[plugins]
# Verify signatures (ed25519) when present; invalid signatures fail to load (recommended)
enforce_signatures = true
# Require signatures for all plugins (unsigned will be rejected)
require_signatures_for_all = false
# Hot reloading of plugins on changes (developer-friendly)
hot_reload = true

# Path-level signature requirements (dev defaults)
[plugins.paths.system]
require_signatures = true

[plugins.paths.user]
require_signatures = false

[plugins.paths.project]
require_signatures = false
# Subpixel text rendering for WGPU: "Auto" | "Enabled" | "Disabled"
subpixel_text = "Auto"
# Subpixel orientation for WGPU when enabled: "RGB" | "BGR"
subpixel_orientation = "RGB"
# Subpixel gamma exponent (typical ~2.2)
subpixel_gamma = 2.2
# sRGB swapchain preference for WGPU: "Auto" | "Enabled" | "Disabled"
srgb_swapchain = "Auto"
# Clear evicted WGPU atlas layer to zero (cosmetic)
zero_evicted_atlas_layer = false
# WGPU atlas eviction policy: "RoundRobin" | "LruMinOccupancy"
atlas_eviction_policy = "LruMinOccupancy"
# Periodic atlas stats reporting interval in frames (0 disables)
atlas_report_interval_frames = 0

# Keybindings can be customized here
# Command Palette (Linux/Windows default is Ctrl+Shift+P; macOS uses Cmd+P)
[[keyboard.bindings]]
key = "p"
mods = "Control|Shift"
action = "OpenCommandPalette"

# Blocks Search panel
[[keyboard.bindings]]
key = "s"
mods = "Control|Shift"
action = "OpenBlocksSearchPanel"

# Workflows panel (requires `workflow` feature)
[[keyboard.bindings]]
key = "w"
mods = "Control|Shift"
action = "OpenWorkflowsPanel"

# AI panel (optional) — toggle with Ctrl+Shift+A
[[keyboard.bindings]]
key = "a"
mods = "Control|Shift"
action = "ToggleAiPanel"

# Tabs: next/previous (Ctrl+Tab / Ctrl+Shift+Tab)
[[keyboard.bindings]]
key = "Tab"
mods = "Control"
action = "NextTab"

[[keyboard.bindings]]
key = "Tab"
mods = "Control|Shift"
action = "PreviousTab"

# Tabs: create/close (Ctrl+T / Ctrl+W)
[[keyboard.bindings]]
key = "t"
mods = "Control"
action = "CreateTab"

[[keyboard.bindings]]
key = "w"
mods = "Control"
action = "CloseTab"

# Sample local workflows (appear in Workflows panel and palette)
[[workflows]]
name = "Find large files"
description = "Find files larger than a threshold under a directory"
command = "find {dir} -type f -size +{size} 2>/dev/null"
  [[workflows.params]]
  name = "dir"
  default = "."
  [[workflows.params]]
  name = "size"
  default = "100M"

[[workflows]]
name = "Git: conventional commit"
description = "Compose a conventional commit message and commit staged changes"
command = "git commit -m \"{type}: {subject}\""
  [[workflows.params]]
  name = "type"
  default = "feat"
  [[workflows.params]]
  name = "subject"
  default = "initial commit"

[[workflows]]
name = "Clean build artifacts"
description = "Remove common build/target directories"
command = "rm -rf target dist build .cache"

# High-value, safe workflows
[[workflows]]
name = "Find large git repos"
description = "List .git directories by size (approx. repo size)"
command = "find {dir} -type d -name .git -prune -exec du -sh {} + | sort -hr | head -n {n}"
  [[workflows.params]]
  name = "dir"
  default = "."
  [[workflows.params]]
  name = "n"
  default = "10"

[[workflows]]
name = "System resource snapshot"
description = "Print kernel, uptime, memory, disk usage, and top memory processes"
command = "sh -c 'echo == date ==; date; echo; echo == uname -a ==; uname -a; echo; echo == uptime ==; uptime; echo; echo == free -h ==; free -h || true; echo; echo == df -h ==; df -h; echo; echo == top memory processes ==; ps -eo pid,comm,%mem,%cpu --sort=-%mem | head -n 15'"

[[workflows]]
name = "List largest node_modules"
description = "Find node_modules directories and show their sizes"
command = "find {dir} -type d -name node_modules -prune -exec du -sh {} + | sort -hr | head -n {n}"
  [[workflows.params]]
  name = "dir"
  default = "."
  [[workflows.params]]
  name = "n"
  default = "20"

# Additional safe workflows
[[workflows]]
name = "Python: create and activate venv"
description = "Create .venv in target dir and print activation instructions"
command = "sh -c 'set -e; dir=\"{dir}\"; [ -d \"$dir/.venv\" ] || python3 -m venv \"$dir/.venv\"; echo \"To activate: source $dir/.venv/bin/activate\"'"
  [[workflows.params]]
  name = "dir"
  default = "."

[[workflows]]
name = "Git: clean dry-run"
description = "Show what git clean would remove (no deletion)"
command = "sh -c 'flag=\"\"; [ \"{include_ignored}\" = \"yes\" ] && flag=\" -x\"; git clean -fdn$flag'"
  [[workflows.params]]
  name = "include_ignored"
  default = "no"

[[workflows]]
name = "Docker: dangling images report"
description = "List dangling (untagged) images"
command = "docker images --filter dangling=true --format \"{{.Repository}}:{{.Tag}} {{.ID}} {{.Size}}\""

[[workflows]]
name = "Docker: prune (confirm=yes to proceed)"
description = "Prune unused data (requires confirm=yes; otherwise shows usage)"
command = "sh -c 'if [ \"{confirm}\" != \"yes\" ]; then echo \"Refusing to prune. Set confirm=yes to proceed.\"; docker system df; else docker system prune -f; fi'"
  [[workflows.params]]
  name = "confirm"
  default = "no"

# Git: largest files in repo history (read-only)
[[workflows]]
name = "Git: largest files in history"
description = "List largest blobs ever committed and their paths"
command = "git rev-list --objects --all | git cat-file --batch-check='%(objecttype) %(objectsize) %(rest)' | awk '$1==\"blob\"{size=$2; $1=$2=\"\"; sub(/^ /, \"\", $0); print size, $0}' | sort -nr | head -n {n}"
  [[workflows.params]]
  name = "n"
  default = "20"

# Git: merged/unmerged branches relative to base (read-only)
[[workflows]]
name = "Git: branches merged/unmerged"
description = "Show branches merged and not merged into a base branch"
command = "sh -c 'base=\"{base}\"; echo \"Merged into $base:\"; git branch --merged \"$base\"; echo; echo \"Not merged into $base:\"; git branch --no-merged \"$base\"'"
  [[workflows.params]]
  name = "base"
  default = "main"

# NPM: audit (read-only)
[[workflows]]
name = "NPM: audit"
description = "Run npm audit with a minimum severity level"
command = "sh -c 'cd \"{dir}\" && npm audit --audit-level={level} || true'"
  [[workflows.params]]
  name = "dir"
  default = "."
  [[workflows.params]]
  name = "level"
  default = "moderate"

# NPM: prune dry-run (safe)
[[workflows]]
name = "NPM: prune dry-run"
description = "Show what npm prune would remove (no deletion)"
command = "sh -c 'cd \"{dir}\" && npm prune --dry-run'"
  [[workflows.params]]
  name = "dir"
  default = "."

# Disk: top directories by size (read-only)
[[workflows]]
name = "Disk: top directories by size"
description = "Show largest subdirectories under a path"
command = "sh -c 'du -xh --max-depth=1 \"{dir}\" | sort -hr | head -n {n}'"
  [[workflows.params]]
  name = "dir"
  default = "."
  [[workflows.params]]
  name = "n"
  default = "20"

# Network: listening ports (read-only)
[[workflows]]
name = "Network: listening ports"
description = "List listening TCP/UDP sockets with owning processes"
command = "sh -c 'ss -tulpn 2>/dev/null || netstat -tulpn 2>/dev/null || echo \"ss/netstat not available\"'"

# Pip: cache size (read-only)
[[workflows]]
name = "Pip: cache size"
description = "Show pip cache directory size"
command = "sh -c 'd=$(python3 -m pip cache dir 2>/dev/null || true); [ -n \"$d\" ] && du -sh \"$d\" || echo \"pip cache dir not found\"'"

# Pip: cache purge (confirm=yes to proceed)
[[workflows]]
name = "Pip: cache purge (confirm=yes)"
description = "Purge pip cache (requires confirm=yes)"
command = "sh -c 'if [ \"{confirm}\" = \"yes\" ]; then python3 -m pip cache purge; else echo \"Refusing to purge. Set confirm=yes to proceed.\"; fi'"
  [[workflows.params]]
  name = "confirm"
  default = "no"

# Workspace: tabs and splits configuration
[workspace]
# Enable Warp-style visuals and interactions (tabs/splits)
warp_style = true

# Warp-style keybindings toggle
[workspace.warp_style_bindings]
# When true (default), integrate Warp-like keybindings at config load.
# On macOS: Cmd-based shortcuts; elsewhere: Ctrl-based. Conflicting defaults are deconflicted.
enable = true

[workspace.tab_bar]
# Position of the tab bar: "Top" | "Bottom" | "Hidden"
position = "Top"
# Whether to show the tab bar
show = true
# Visibility behavior: "Auto" | "Always" | "Hover"
# Auto => Always unless fullscreen (then Hover)
# Hover => Show the bar only when the mouse is near the top/bottom edge
visibility = "Auto"
# Show close button on tabs
show_close_button = true
# Only render the close button when hovering a tab (region remains clickable)
close_button_on_hover = false
# Show modified indicator
show_modified_indicator = true
# Show a [+] button to create new tabs in remaining space
show_new_tab_button = true
# Show tab numbering (e.g., "1: title")
show_tab_numbers = false
# Maximum tab title length
max_title_length = 20
# Note: Warp overlay-style tab bar no longer reserves a terminal row.

# Split pane visuals and behavior (Warp-style)
# These options control the appearance of split dividers and resize handles.
# All keys are commented out by default for discoverability; uncomment to customize.
[workspace.splits]
# Enable split indicators/preview overlay
# preview_enabled = true
# Base line width for split indicators (in pixels)
# indicator_line_width = 2.5
# Base line alpha (0.0..1.0)
# indicator_line_alpha = 0.5
# Line width multiplier when hovering or dragging a divider
# indicator_hover_scale = 2.0
# Line alpha when hovering or dragging (0.0..1.0)
# indicator_hover_alpha = 0.95
# Resize handle baseline size (in pixels); actual size adapts to divider length
# handle_size = 8.0
# Resize handle alpha (0.0..1.0)
# handle_alpha = 0.95
# Show resize handle on divider hover
# show_resize_handles = true
# Optional explicit colors for line/handle/overlay (override theme tokens when set)
# indicator_line_color = { r = 180, g = 180, b = 180 }
# handle_color = { r = 122, g = 162, b = 247 }
# overlay_color = { r = 0, g = 0, b = 0 }
# Alpha for the zoom overlay when a pane is zoomed (0.0..1.0)
# zoom_overlay_alpha = 0.06
