name: Link Checker

on:
  push:
    paths:
      - '**/*.md'
      - '.github/workflows/link-check.yml'
      - 'docs/**'
  pull_request:
    paths:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch: {}

jobs:
  lychee:
    name: lychee link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress --verbose --require-https --max-redirects 5 --timeout 20s --exclude-mail --accept 200,204,403 "./**/*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
