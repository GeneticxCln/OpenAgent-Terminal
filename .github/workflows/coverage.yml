name: coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Measure and Gate Coverage
    runs-on: ubuntu-latest
    env:
      # Start at 70%; increase to 80% once stable
      MIN_COVERAGE: "70"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable with llvm-tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cov-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage (gating: prioritized crates)
        run: |
          cargo llvm-cov \
            --package openagent-terminal \
            --package openagent-terminal-core \
            --all-features --locked \
            --fail-under-lines ${MIN_COVERAGE} \
            --lcov --output-path lcov-prioritized.info

      - name: Upload lcov (prioritized)
        uses: actions/upload-artifact@v4
        with:
          name: lcov-prioritized.info
          path: lcov-prioritized.info

      - name: Coverage (full workspace HTML)
        run: |
          cargo llvm-cov \
            --workspace --all-features --locked \
            --html --output-dir coverage

      - name: Upload coverage HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage

      - name: Upload Pages artifact (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage

  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: coverage
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
