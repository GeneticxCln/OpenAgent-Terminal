name: CI

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable) with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format (rustfmt)
        run: cargo fmt --all -- --check

  clippy-all:
    name: Clippy (all targets, all features, deny warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable) with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run clippy (workspace, all-targets, all-features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  check-all:
    name: Check (workspace, default + all-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: cargo check (default features)
        run: cargo check --workspace --all-targets
      - name: cargo check (all features)
        run: cargo check --workspace --all-targets --all-features

  test-all:
    name: Test (workspace, all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: cargo test (all features)
        run: cargo test --workspace --all-features -- --nocapture

  nextest:
    name: Nextest (workspace, all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked
      - name: Run nextest (all features)
        run: cargo nextest run --workspace --all-features --failure-output immediate

  cargo-hack:
    name: Feature matrix (cargo-hack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-hack
        run: cargo install cargo-hack --locked
      - name: Check each feature individually (workspace)
        run: cargo hack check --workspace --each-feature --all-targets
      - name: Check common feature pairs for app crate (depth=2)
        run: cargo hack check -p openagent-terminal --feature-powerset --depth 2 --all-targets --keep-going
      - name: Test common feature pairs for app crate (depth=2)
        run: cargo hack test -p openagent-terminal --feature-powerset --depth 2 --all-targets --keep-going -- --nocapture

  build:
    name: Build and test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        feature-set: [default, core-no-default, wgpu, ai-ollama, sync, security-lens]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable) with components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format (rustfmt)
        run: cargo fmt --all -- --check

      - name: Determine feature arguments
        id: features
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix['feature-set'] }}" in
            default)
              echo "args=" >> $GITHUB_OUTPUT
              ;;
            core-no-default)
              echo "args=-p openagent-terminal-core --no-default-features" >> $GITHUB_OUTPUT
              ;;
            wgpu)
              echo "args=-p openagent-terminal -F wgpu" >> $GITHUB_OUTPUT
              ;;
            ai-ollama)
              echo "args=-p openagent-terminal -F ai-ollama" >> $GITHUB_OUTPUT
              ;;
            sync)
              echo "args=-p openagent-terminal -F sync" >> $GITHUB_OUTPUT
              ;;
            security-lens)
              echo "args=-p openagent-terminal -F security-lens" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unknown feature-set" >&2; exit 1
              ;;
          esac

      - name: Clippy (treat warnings as errors)
        run: cargo clippy --all-targets ${{ steps.features.outputs.args }} -- -D warnings

      - name: Test
        run: cargo test ${{ steps.features.outputs.args }}

  check-macos-x86_64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install target
        run: rustup target add x86_64-apple-darwin

      - name: Build
        run: cargo build --target=x86_64-apple-darwin

  security:
    name: Security checks (cargo-deny, cargo-audit, geiger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo-deny (advisories, bans, sources, licenses)
        run: cargo deny --config .dev/deny.toml check advisories bans sources licenses

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo-audit
        run: cargo audit -D warnings

      - name: Install cargo-geiger (unsafe usage scan)
        run: cargo install cargo-geiger --locked

      - name: Geiger scan (workspace, all targets)
        shell: bash
        run: |
          set -euo pipefail
          # Run geiger across the workspace; include all targets and features for maximal coverage
          cargo geiger --workspace --all-features --all-targets | tee geiger-report.txt
          echo "## 🔎 Unsafe Usage Report (cargo-geiger)" >> $GITHUB_STEP_SUMMARY
          echo "This run's geiger report is attached as an artifact. Below is the summary table:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          sed -n '1,300p' geiger-report.txt >> $GITHUB_STEP_SUMMARY || true

      - name: Upload Geiger report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geiger-report-${{ github.run_number }}
          path: geiger-report.txt
          if-no-files-found: error


  shellcheck:
    name: Shellcheck (shell-integration and scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find . \
            -type f \
            \( -name "*.sh" -o -name "*.bash" \) \
            -not -path "*/target/*" \
            -print)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts found"
            exit 0
          fi
          # Run with warning severity to keep signal strong but not overly strict initially
          shellcheck -S warning "${files[@]}"

  release-smoke:
    name: Release build + smoke tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (1.79.0)
        uses: dtolnay/rust-toolchain@1.79.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release (core)
        run: cargo build -p openagent-terminal --release

      - name: Smoke test render (wgpu)
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p openagent-terminal -F wgpu --release --example render_smoke -- --backend=wgpu | tee /tmp/smoke.log
          # Enforce WGPU-only backend on all runners
          grep -E "backend:wgpu" /tmp/smoke.log
      - name: Offscreen WGPU snapshot
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p openagent-terminal -F wgpu --release --example wgpu_snapshot | tee /tmp/offscreen.json || true

      - name: GPU snapshots (Linux via xvfb, WGPU)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
# Generate/update goldens (first run)
for scenario in confirm_overlay message_bar_error message_bar_warning search_bar_cursor folded_blocks split_panes split_overlay tab_bar tab_bar_hover tab_bar_drag tab_bar_overflow tab_bar_bottom tab_bar_reduce_motion; do
            SNAPSHOT_BACKEND=wgpu xvfb-run -a cargo run -p openagent-terminal --release -F preview_ui --example snapshot_capture -- --update-golden --scenario=$scenario --backend=wgpu
          done
# Compare against goldens with per-platform threshold
for scenario in confirm_overlay message_bar_error message_bar_warning search_bar_cursor folded_blocks split_panes split_overlay tab_bar tab_bar_hover tab_bar_drag tab_bar_overflow tab_bar_bottom tab_bar_reduce_motion; do
            SNAPSHOT_BACKEND=wgpu xvfb-run -a cargo run -p openagent-terminal --release -F preview_ui --example snapshot_capture -- --threshold=0.996 --scenario=$scenario --backend=wgpu
          done

      - name: GPU snapshots (AI overlays)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          # Build with ai feature for overlay rendering (no provider needed)
          for scenario in ai_loading ai_error ai_proposals; do
            xvfb-run -a cargo run -p openagent-terminal --release -F ai,preview_ui --example snapshot_capture -- --update-golden --scenario=$scenario
            xvfb-run -a cargo run -p openagent-terminal --release -F ai,preview_ui --example snapshot_capture -- --threshold=0.996 --scenario=$scenario
          done

      - name: Perf cold start check (<= 800ms)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          xvfb-run -a cargo run -p openagent-terminal --release --example perf_cold_start -- --max-ms=800

      - name: Perf latency check (<16ms average)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          # Run perf with explicit threshold; rely on exit code
          xvfb-run -a cargo run -p openagent-terminal --release --example perf_latency -- --max-ms=16.0

  ai-tests:
    name: AI feature tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run AI feature tests
        run: cargo test -p openagent-terminal -F ai -- --nocapture

  plugins-tests:
    name: Plugins feature tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (1.79.0)
        uses: dtolnay/rust-toolchain@1.79.0
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build and test with plugins feature (app crate)
        run: cargo test -p openagent-terminal -F plugins -- --nocapture
      - name: Plugin loader tests
        run: cargo test -p plugin-loader -- --nocapture
      - name: Plugin system tests
        run: cargo test -p plugin-system -- --nocapture

  shader-sync-check:
    name: Shader sync check (RectKind vs WGSL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run shader sync unit test
        run: cargo test -p openagent-terminal --lib rect_kind_count_embedded_in_wgsl -- --nocapture

  wgpu-linux:
    name: WGPU smoke + perf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (1.79.0)
        uses: dtolnay/rust-toolchain@1.79.0
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build with WGPU feature
        run: cargo build -p openagent-terminal -F wgpu --release
      - name: Smoke test render_smoke (wgpu)
        shell: bash
        run: |
          set -euo pipefail
          xvfb-run -a cargo run -p openagent-terminal -F wgpu --release --example render_smoke -- --backend=wgpu | tee /tmp/wgpu-smoke.log
          # Enforce WGPU-only backend on Linux runner
          grep -E "backend:wgpu" /tmp/wgpu-smoke.log
      - name: WGPU perf example
        shell: bash
        run: |
          set -euo pipefail
          xvfb-run -a cargo run -p openagent-terminal -F wgpu --release --example perf_wgpu

      - name: WGPU offscreen snapshot readback
        shell: bash
        run: |
          set -euo pipefail
          OUT_JSON=$(xvfb-run -a cargo run -p openagent-terminal -F wgpu --release --example wgpu_snapshot)
          echo "$OUT_JSON"
          OUT_PATH=$(echo "$OUT_JSON" | sed -n 's/.*\"output\":\"\([^\"]*\)\".*/\1/p')
          WIDTH=$(echo "$OUT_JSON" | sed -n 's/.*\"width\":\([0-9]\+\).*/\1/p')
          HEIGHT=$(echo "$OUT_JSON" | sed -n 's/.*\"height\":\([0-9]\+\).*/\1/p')
          test -f "$OUT_PATH"
          test "$WIDTH" = "256" && test "$HEIGHT" = "128"
      - name: Upload WGPU offscreen artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgpu-offscreen
          path: tests/snapshot_output/wgpu_offscreen.png

      - name: WGPU GPU snapshots (scenes)
        shell: bash
        run: |
          set -euo pipefail
# Compare against committed goldens for a subset of scenarios
          for scenario in confirm_overlay tab_bar split_overlay; do
            SNAPSHOT_BACKEND=wgpu xvfb-run -a cargo run -p openagent-terminal -F wgpu,preview_ui --release --example snapshot_capture -- --threshold=0.996 --scenario=$scenario --backend=wgpu
          done


  wgpu-dpi-theme-snapshots:
    name: WGPU DPI/theme snapshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build snapshot example
        run: cargo build -p openagent-terminal -F wgpu,preview_ui --release --example snapshot_capture
      - name: Run snapshots at multiple DPI scales (wgpu)
        shell: bash
        run: |
          set -euo pipefail
          for scale in 1.0 1.5 2.0; do
            export WINIT_X11_SCALE_FACTOR=$scale
            for scenario in tab_bar split_overlay confirm_overlay; do
              SNAPSHOT_BACKEND=wgpu xvfb-run -a cargo run -p openagent-terminal -F wgpu,preview_ui --release --example snapshot_capture -- --threshold=0.996 --scenario=$scenario --backend=wgpu
            done
          done

  windows-pty-repro:
    name: Windows PTY repro tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (1.79.0)
        uses: dtolnay/rust-toolchain@1.79.0
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run Windows PTY repro tests (core crate)
        env:
          RUST_BACKTRACE: 1
        run: |
          cargo test -p openagent-terminal-core --test windows_pty_repro -- --nocapture --test-threads=1

  coverage:
    name: Coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (1.79.0)
        uses: dtolnay/rust-toolchain@1.79.0
        with:
          components: llvm-tools-preview
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate coverage (exclude GUI crate)
        # NOTE:
        # - We intentionally exclude the GUI app crate (openagent-terminal) from coverage reporting
        #   because its winit/wgpu integrations are difficult to exercise in a headless CI environment.
        #   The coverage threshold applies to core libraries, engine, and supporting crates.
        run: |
          set -euo pipefail
          cargo llvm-cov --workspace --exclude openagent-terminal --lcov --output-path lcov.info
          # Enforce a minimal workspace coverage threshold (lines) across non-GUI crates.
          THRESH=$(cargo llvm-cov --workspace --json | jq -r '."coverage"."line" // .coverage.line // empty')
          echo "Coverage(line): ${THRESH}%"
          # Fallback: compute from summary if tool version differs
          if [ -z "$THRESH" ]; then
            THRESH=$(cargo llvm-cov --workspace --summary-only | sed -n 's/.*lines: \([0-9.]*\)%.*/\1/p')
          fi
          REQ=80
          awk -v a="$THRESH" -v b="$REQ" 'BEGIN { exit (a+0 >= b ? 0 : 1) }'
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

  sanitizers:
    name: Sanitizers (ASan/UBSan) on Linux subset
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined]
        crate: [openagent-terminal-core, openagent-terminal-config, openagent-terminal-sync]
    env:
      # Sanitizer config
      RUSTFLAGS: "-Z sanitizer=${{ matrix.sanitizer }} -C debuginfo=1 -C opt-level=1"
      RUSTDOCFLAGS: "-Z sanitizer=${{ matrix.sanitizer }}"
      ASAN_OPTIONS: "detect_leaks=0,abort_on_error=1"
      UBSAN_OPTIONS: "abort_on_error=1"
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain with rust-src (for sanitizers)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build tests with ${{ matrix.sanitizer }} for ${{ matrix.crate }}
        shell: bash
        run: |
          set -euo pipefail
          # Build tests with sanitized std; avoid heavy GUI deps in sanitizer job
          cargo +nightly test -Z build-std -p ${{ matrix.crate }} --no-default-features --tests --no-run

      - name: Run tests with ${{ matrix.sanitizer }} for ${{ matrix.crate }}
        shell: bash
        run: |
          set -euo pipefail
          # Run the test binaries produced above
          cargo +nightly test -Z build-std -p ${{ matrix.crate }} --no-default-features --tests -- --nocapture
