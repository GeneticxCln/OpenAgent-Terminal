name: docs-release

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-docs:
    name: Build and upload API docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build cargo doc (workspace, all features)
        run: |
          cargo doc --workspace --all-features --no-deps
          tar -C target -czf api-docs.tar.gz doc

      - name: Upload docs to release assets
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: api-docs.tar.gz

      - name: Upload docs artifact (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: api-docs.tar.gz
