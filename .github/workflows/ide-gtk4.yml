name: IDE GTK4 Build

on:
  pull_request:
    paths:
      - 'crates/openagent-terminal-ide/**'
      - 'build-support/pkgconfig/**'
      - '.github/workflows/ide-gtk4.yml'
  push:
    branches:
      - main
    paths:
      - 'crates/openagent-terminal-ide/**'
      - 'build-support/pkgconfig/**'
      - '.github/workflows/ide-gtk4.yml'

jobs:
  build-gtk4-ide:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (GTK4 + WebKitGTK 4.1)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build IDE crate with web-editors feature (GTK4 backend)
        env:
          PKG_CONFIG_PATH: ${{ github.workspace }}/build-support/pkgconfig:${{ env.PKG_CONFIG_PATH }}
        run: |
          cargo check -p openagent-terminal-ide --no-default-features --features web-editors

      - name: Clippy (warnings as errors)
        env:
          PKG_CONFIG_PATH: ${{ github.workspace }}/build-support/pkgconfig:${{ env.PKG_CONFIG_PATH }}
        run: |
          cargo clippy -p openagent-terminal-ide --no-default-features --features web-editors -- -D warnings
