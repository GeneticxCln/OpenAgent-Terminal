name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CARGO_TERM_COLOR: always

jobs:
  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install scdoc
      - name: Install ARM target
        run: rustup update && rustup target add aarch64-apple-darwin && rustup target add x86_64-apple-darwin
      - name: Test
        run: cargo test --release --target=x86_64-apple-darwin
      - name: Build ARM
        run: cargo build --release --target=aarch64-apple-darwin
      - name: Make DMG
        run: make dmg-universal
      - name: Notarize DMG (if secrets configured)
        if: ${{ secrets.APPLE_ID && secrets.APPLE_TEAM_ID && secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          DMG_PATH="./target/release/osx/OpenAgentTerminal.dmg"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --wait
      - name: Upload Application
        run: |
          mv ./target/release/osx/OpenAgentTerminal.dmg ./openagent-terminal-${GITHUB_REF##*/}.dmg
          ./.github/workflows/upload_asset.sh ./openagent-terminal-${GITHUB_REF##*/}.dmg $GITHUB_TOKEN

  windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: cargo test --release
      - name: Build
        run: cargo build --release
      - name: Upload portable executable (unsigned)
        run: |
          cp ./target/release/openagent-terminal.exe ./openagent-terminal-${GITHUB_REF##*/}-portable.exe
          ./.github/workflows/upload_asset.sh \
            ./openagent-terminal-${GITHUB_REF##*/}-portable.exe $GITHUB_TOKEN

      - name: Sign portable executable (optional)
        if: ${{ secrets.WINDOWS_SIGNING_CERT && secrets.WINDOWS_SIGNING_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Signing Windows portable executable..."
          # Expect a base64-encoded PFX in WINDOWS_SIGNING_CERT
          echo "$WINDOWS_SIGNING_CERT" | base64 -d > signing_cert.pfx
          # Use osslsigncode if available on runner; otherwise skip gracefully
          if command -v osslsigncode >/dev/null 2>&1; then
            osslsigncode sign -pkcs12 signing_cert.pfx -pass "$WINDOWS_SIGNING_PASSWORD" \
              -in ./openagent-terminal-${GITHUB_REF##*/}-portable.exe \
              -out ./openagent-terminal-${GITHUB_REF##*/}-portable-signed.exe \
              -n "OpenAgent Terminal" -i "https://github.com/GeneticxCln/OpenAgent-Terminal"
            ./.github/workflows/upload_asset.sh \
              ./openagent-terminal-${GITHUB_REF##*/}-portable-signed.exe $GITHUB_TOKEN
          else
            echo "osslsigncode not available; skipping portable exe signing"
          fi
          rm -f signing_cert.pfx
      - name: Install WiX
        run: dotnet tool install --global wix --version 4.0.5
      - name: Create msi installer
        run: |
          wix extension add WixToolset.UI.wixext/4.0.5 WixToolset.Util.wixext/4.0.5
          wix build -arch "x64" -ext WixToolset.UI.wixext -ext WixToolset.Util.wixext \
          -out "./openagent-terminal-${GITHUB_REF##*/}-installer.msi" "openagent-terminal/windows/wix/openagent-terminal.wxs"
      - name: Sign msi installer (optional)
        if: ${{ secrets.WINDOWS_SIGNING_CERT && secrets.WINDOWS_SIGNING_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$WINDOWS_SIGNING_CERT" | base64 -d > signing_cert.pfx
          if command -v osslsigncode >/dev/null 2>&1; then
            osslsigncode sign -pkcs12 signing_cert.pfx -pass "$WINDOWS_SIGNING_PASSWORD" \
              -in ./openagent-terminal-${GITHUB_REF##*/}-installer.msi \
              -out ./openagent-terminal-${GITHUB_REF##*/}-installer-signed.msi \
              -n "OpenAgent Terminal" -i "https://github.com/GeneticxCln/OpenAgent-Terminal"
            mv ./openagent-terminal-${GITHUB_REF##*/}-installer-signed.msi ./openagent-terminal-${GITHUB_REF##*/}-installer.msi
          else
            echo "osslsigncode not available; skipping MSI signing"
          fi
          rm -f signing_cert.pfx
      - name: Upload msi installer
        run: |
          ./.github/workflows/upload_asset.sh \
            ./openagent-terminal-${GITHUB_REF##*/}-installer.msi $GITHUB_TOKEN
      - name: Build MSIX (unsigned)
        run: |
          cargo install cargo-msix --locked
          cargo msix bundle -p openagent-terminal --output "./openagent-terminal-${GITHUB_REF##*/}.msix"
      - name: Upload MSIX (unsigned)
        run: |
          ./.github/workflows/upload_asset.sh ./openagent-terminal-${GITHUB_REF##*/}.msix $GITHUB_TOKEN

  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libfreetype6-dev libfontconfig1-dev \
            libxcb-xfixes0-dev libxkbcommon-dev python3 scdoc curl file
      - name: Test
        run: cargo test --release
      - name: Regenerate shell completions
        run: |
          REBUILD_COMPLETIONS=1 cargo test --release -p openagent-terminal --test-threads 1 || true
      - name: Generate manpages
        run: |
          scdoc < extra/man/openagent-terminal.1.scd | gzip -c > "./openagent-terminal.1.gz"
          scdoc < extra/man/openagent-terminal-msg.1.scd | gzip -c > "./openagent-terminal-msg.1.gz"
          scdoc < extra/man/openagent-terminal.5.scd | gzip -c > "./openagent-terminal.5.gz"
          scdoc < extra/man/openagent-terminal-bindings.5.scd | gzip -c > "./openagent-terminal-bindings.5.gz"
      - name: Build .deb (cargo-deb)
        run: |
          cargo install cargo-deb --locked
          cargo deb -p openagent-terminal --no-build
          DEB_PATH=$(ls target/debian/*.deb | head -n1)
          cp "$DEB_PATH" ./openagent-terminal-${GITHUB_REF##*/}.deb
          ./.github/workflows/upload_asset.sh ./openagent-terminal-${GITHUB_REF##*/}.deb $GITHUB_TOKEN
      - name: Build AppImage
        shell: bash
        run: |
          set -euo pipefail
          APPDIR=./AppDir
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/applications"
          cp ./target/release/openagent-terminal "$APPDIR/usr/bin/"
          cp ./extra/linux/OpenAgentTerminal.desktop "$APPDIR/usr/share/applications/"
          # Minimal AppRun
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE=$(dirname "$0")
          exec "$HERE/usr/bin/openagent-terminal" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"
          # Fetch appimagetool
          curl -L -o appimagetool-x86_64.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          # Build AppImage
          ./appimagetool-x86_64.AppImage "$APPDIR" ./openagent-terminal-${GITHUB_REF##*/}.AppImage || ./appimagetool-x86_64.AppImage --appimage-extract-and-run "$APPDIR" ./openagent-terminal-${GITHUB_REF##*/}.AppImage
          ./.github/workflows/upload_asset.sh ./openagent-terminal-${GITHUB_REF##*/}.AppImage $GITHUB_TOKEN
      - name: Smoke launch
        run: |
          xvfb-run -a ./target/release/openagent-terminal --version || true
      - name: Upload Assets
        run: |
          ./.github/workflows/upload_asset.sh ./extra/logo/openagent-terminal.svg $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./openagent-terminal.1.gz $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./openagent-terminal-msg.1.gz $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./openagent-terminal.5.gz $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./openagent-terminal-bindings.5.gz $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./extra/completions/openagent-terminal.bash $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./extra/completions/openagent-terminal.fish $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./extra/completions/_openagent-terminal $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./extra/linux/OpenAgentTerminal.desktop $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./extra/openagent-terminal.info $GITHUB_TOKEN
