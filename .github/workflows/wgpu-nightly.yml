name: WGPU Nightly Snapshots

on:
  schedule:
    - cron: '0 4 * * *'  # Daily at 04:00 UTC
  workflow_dispatch:
    inputs:
      update_goldens:
        description: "Update committed goldens from nightly run"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  wgpu-nightly:
    name: Nightly WGPU visual snapshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Ubuntu)
        uses: ./.github/actions/install-ubuntu-deps

      - name: Build with WGPU feature (release)
        run: cargo build -p openagent-terminal -F wgpu --release

      - name: Nightly WGPU snapshots (generate goldens - optional)
        if: ${{ inputs.update_goldens == true }}
        shell: bash
        run: |
          set -euo pipefail
          # Scenarios we consider representative for nightly
          scenarios=(confirm_overlay tab_bar split_overlay)
          for scenario in "${scenarios[@]}"; do
            SNAPSHOT_BACKEND=wgpu xvfb-run -a cargo run -p openagent-terminal -F wgpu,preview_ui --release --example snapshot_capture -- --update-golden --scenario="$scenario" --backend=wgpu
          done
          echo "Goldens updated under tests/golden_images/."
      - name: Create PR with updated WGPU goldens
        if: ${{ inputs.update_goldens == true }}
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: |
            tests/golden_images/**
          commit-message: "test(wgpu): update WGPU snapshot goldens"
          title: "test(wgpu): update WGPU snapshot goldens"
          body: |
            Automated update of WGPU snapshot golden images.

            This PR was created by the WGPU Nightly Snapshots workflow with update_goldens=true.
          branch: ci/wgpu-update-goldens
          delete-branch: true
          signoff: false
      - name: Nightly WGPU snapshots (compare)
        shell: bash
        run: |
          set -euo pipefail
          scenarios=(confirm_overlay tab_bar split_overlay)
          for scenario in "${scenarios[@]}"; do
            SNAPSHOT_BACKEND=wgpu xvfb-run -a cargo run -p openagent-terminal -F wgpu,preview_ui --release --example snapshot_capture -- --threshold=0.995 --scenario="$scenario" --backend=wgpu
          done

      - name: AI feature tests (nightly)
        run: |
          set -euo pipefail
          cargo test -p openagent-terminal -F ai -- --nocapture

      - name: Plugins smoke tests (nightly)
        run: |
          set -euo pipefail
          cargo test -p plugin-loader -p plugin-system -- --nocapture

      - name: Upload snapshot outputs (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wgpu-nightly-snapshots
          path: |
            openagent-terminal/tests/snapshot_output/**
            tests/snapshot_output/**
          if-no-files-found: ignore

