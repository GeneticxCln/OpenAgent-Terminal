[package]
name = "git-context"
version = "1.0.0"
edition = "2021"

[dependencies]
plugin-api = { path = "../../crates/plugin-api" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[lib]
name = "git_context"
path = "src/lib.rs"
crate-type = ["cdylib"]

[features]
default = []
wasi = []
